<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --dark:        #080810;
      --surface:     #0f0f1a;
      --card:        #13131f;
      --border:      rgba(255,255,255,.07);
      --text:        #e8e8f0;
      --muted:       #8888a0;
      --lime:        #a3e635;
      --lime-pale:   rgba(163,230,53,.12);
      --lime-border: rgba(163,230,53,.25);
      --r:           12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--lime-pale);
      border: 1px solid var(--lime-border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-mark svg { width: 20px; height: 20px; }
    .logo-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .login-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .login-header { text-align: center; }
    .login-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-header p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    #google-btn-container {
      display: flex;
      justify-content: center;
    }
    .status-msg {
      font-size: 13px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .status-msg.error {
      display: block;
      background: rgba(248,113,113,.12);
      border: 1px solid rgba(248,113,113,.25);
      color: #f87171;
    }
    .status-msg.info {
      display: block;
      background: var(--lime-pale);
      border: 1px solid var(--lime-border);
      color: var(--lime);
    }
    .footer-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .footer-note a { color: var(--lime); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="4" cy="10" r="2.5" fill="#a3e635"/>
          <circle cx="16" cy="10" r="2.5" fill="#a3e635" opacity="0.5"/>
          <line x1="6.5" y1="10" x2="13.5" y2="10" stroke="#a3e635" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="1.5" fill="#a3e635" opacity="0.8"/>
        </svg>
      </div>
      <span class="logo-name">Relay</span>
    </div>

    <div class="login-card">
      <div class="login-header">
        <h1>Sign in to Relay</h1>
        <p>The structured layer between your content and AI.</p>
      </div>

      <div class="divider">Continue with</div>

      <div id="google-btn-container"></div>

      <div id="status" class="status-msg"></div>
    </div>

    <p class="footer-note">
      By signing in you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.<br>
      Relay does not store your content — only agent traffic metadata.
    </p>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8000'
      : 'https://relay-backend.onrender.com';

    function showStatus(msg, type = 'error') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status-msg ${type}`;
    }

    async function handleCredentialResponse(response) {
      showStatus('Signing you in…', 'info');
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ google_token: response.credential }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Authentication failed');

        localStorage.setItem('relay_token', data.token);
        localStorage.setItem('relay_user',  JSON.stringify(data.user));
        window.location.href = window.location.pathname.includes('/relay/') ? '/relay/app/' : '/app/';
      } catch (err) {
        showStatus(err.message || 'Sign-in failed — please try again.');
      }
    }

    // Redirect if already logged in
    if (localStorage.getItem('relay_token')) {
      window.location.href = window.location.pathname.includes('/relay/') ? '/relay/app/' : '/app/';
    }

    window.onload = () => {
      google.accounts.id.initialize({
        client_id: window.__RELAY_GOOGLE_CLIENT_ID__ || 'REPLACE_WITH_GOOGLE_CLIENT_ID',
        callback: handleCredentialResponse,
        auto_select: false,
      });
      google.accounts.id.renderButton(
        document.getElementById('google-btn-container'),
        {
          theme: 'filled_black',
          size: 'large',
          width: 320,
          text: 'continue_with',
          shape: 'rectangular',
        }
      );
    };
  </script>
</body>
</html>
