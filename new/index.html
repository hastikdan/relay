<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --page:          #ffffff;
      --surface:       #f8f7ff;
      --card:          #ffffff;
      --border:        #e5e3f0;
      --border-dark:   #d1cee8;
      --text:          #1a1730;
      --muted:         #6b6885;
      --subtle:        #9896b0;
      --violet:        #7c3aed;
      --violet-light:  #ede9fe;
      --violet-border: #c4b5fd;
      --teal:          #0d9488;
      --teal-light:    #ccfbf1;
      --red:           #dc2626;
      --red-light:     #fee2e2;
      --red-border:    #fca5a5;
      --r:             14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--surface);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: var(--violet-light);
      border: 1.5px solid var(--violet-border);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 22px; height: 22px; }
    .logo-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .login-card {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 4px 24px rgba(124,58,237,.08);
    }
    .login-header { text-align: center; }
    .login-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .login-header p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--subtle);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'JetBrains Mono', monospace;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    #google-btn-container {
      display: flex;
      justify-content: center;
    }
    .status-msg {
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .status-msg.error {
      display: block;
      background: var(--red-light);
      border: 1px solid var(--red-border);
      color: var(--red);
    }
    .status-msg.info {
      display: block;
      background: var(--violet-light);
      border: 1px solid var(--violet-border);
      color: var(--violet);
    }
    .footer-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }
    .footer-note a { color: var(--violet); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <a href="../" class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="4"  cy="10" r="2.5" fill="#7c3aed"/>
          <circle cx="16" cy="10" r="2.5" fill="#7c3aed" opacity="0.4"/>
          <line x1="6.5" y1="10" x2="13.5" y2="10" stroke="#7c3aed" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="1.5" fill="#7c3aed" opacity="0.75"/>
        </svg>
      </div>
      <span class="logo-name">Relay</span>
    </a>

    <div class="login-card">
      <div class="login-header">
        <h1>Sign in to Relay</h1>
        <p>The structured layer between your content and AI.</p>
      </div>

      <div class="divider">Continue with</div>

      <div id="google-btn-container"></div>

      <div id="status" class="status-msg"></div>
    </div>

    <p class="footer-note">
      By signing in you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.<br>
      Relay does not store your content — only agent traffic metadata.
    </p>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8000'
      : 'https://relay-backend-7dip.onrender.com';

    function showStatus(msg, type = 'error') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status-msg ${type}`;
    }

    async function handleCredentialResponse(response) {
      showStatus('Signing you in…', 'info');
      try {
        const res = await fetch(`${API_URL}/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ google_token: response.credential }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Authentication failed');
        localStorage.setItem('relay_token', data.token);
        localStorage.setItem('relay_user', JSON.stringify(data.user));
        window.location.href = window.location.pathname.includes('/relay/') ? '/relay/app/' : '/app/';
      } catch (err) {
        showStatus(err.message || 'Sign-in failed — please try again.');
      }
    }

    if (localStorage.getItem('relay_token')) {
      window.location.href = window.location.pathname.includes('/relay/') ? '/relay/app/' : '/app/';
    }

    window.onload = () => {
      google.accounts.id.initialize({
        client_id: window.__RELAY_GOOGLE_CLIENT_ID__ || 'REPLACE_WITH_GOOGLE_CLIENT_ID',
        callback: handleCredentialResponse,
        auto_select: false,
      });
      google.accounts.id.renderButton(
        document.getElementById('google-btn-container'),
        { theme: 'outline', size: 'large', width: 320, text: 'continue_with', shape: 'rectangular' }
      );
    };
  </script>
</body>
</html>
